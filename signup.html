<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Registration - Kadapa Smart Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-card {
            max-width: 400px;
            margin: 100px auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            background: white;
        }
        .auth-header {
            background: var(--kdp-primary);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .auth-body { padding: 30px; }
        .form-control { border-radius: 8px; padding: 12px; }
        .btn-auth {
            background: var(--kdp-secondary);
            color: white;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }
        .btn-auth:hover { background: #c0392b; color: white; }
    </style>
</head>
<body class="bg-light">

    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="assets/kadapa_map_logo.png" alt="Kadapa Map Logo" height="60" class="mb-3">
                <h3 class="mb-0">Citizen Portal</h3>
                <p class="opacity-75 mb-0">Create your account to raise grievances</p>
            </div>
            <div class="auth-body">
                <div id="authAlert"></div>
                
                <form id="signupForm">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="regName" class="form-control" placeholder="Enter your name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" id="regPhone" class="form-control" placeholder="10-digit number" pattern="[0-9]{10}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Create Password</label>
                        <input type="password" id="regPass" class="form-control" placeholder="Minimum 6 characters" minlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-auth">Create Account</button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted small">Already have an account? <a href="login.html" class="text-primary">Login here</a></p>
                    <hr>
                    <a href="index.html" class="text-decoration-none small text-muted"><i class="bi bi-arrow-left"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPass').value;
            const btn = e.target.querySelector('button');
            const alertBox = document.getElementById('authAlert');

            btn.disabled = true;
            btn.innerHTML = 'Creating Account...';

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    alertBox.innerHTML = '<div class="alert alert-success">Account created! Redirecting to login...</div>';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    alertBox.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
                    btn.disabled = false;
                    btn.innerHTML = 'Create Account';
                }
            } catch (err) {
                alertBox.innerHTML = '<div class="alert alert-danger">Server error. Try again later.</div>';
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            }
        });
    </script>
</body>
</html>
