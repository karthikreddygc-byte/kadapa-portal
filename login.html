<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kadapa Smart Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-card {
            max-width: 450px;
            margin: 80px auto;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            background: white;
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, var(--primary-color), #1a4a7a);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .login-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        .login-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        .login-tab.active {
            background: white;
            color: var(--kdp-primary);
            border-bottom: 3px solid var(--kdp-primary);
        }
        .login-body { padding: 40px; }
        .form-control { border-radius: 10px; padding: 12px 15px; background: #fdfdfd; }
        .btn-login {
            background: #1a3371; /* Deep Blue */
            color: white !important;
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            border: none;
            transition: transform 0.2s;
        }
        .btn-login:hover { background: #0c1c44; transform: translateY(-2px); color: white !important; }
    </style>
</head>
<body class="bg-light">

    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/kadapa_map_logo.png" alt="Kadapa Map Logo" height="60" class="mb-3">
                <h3 class="mb-1">Secure Login</h3>
                <p class="mb-0 opacity-75">Access the Smart District Services</p>
            </div>
            
            <div class="login-tabs">
                <div class="login-tab active" id="tab-citizen" onclick="switchLogin('citizen')">Citizen</div>
                <div class="login-tab" id="tab-admin" onclick="switchLogin('admin')">Government Admin</div>
            </div>

            <div class="login-body">
                <div id="loginAlert"></div>
                
                <!-- Citizen Login -->
                <form id="citizenForm">
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-phone"></i></span>
                            <input type="tel" id="citPhone" class="form-control" placeholder="10-digit registered number" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-key"></i></span>
                            <input type="password" id="citPass" class="form-control" placeholder="Enter your password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-login">Login as Citizen</button>
                    <div class="text-center mt-4">
                        <p class="text-muted small">New here? <a href="signup.html" class="text-primary fw-bold">Register your Phone</a></p>
                    </div>
                </form>

                <!-- Admin Login (Initially Hidden) -->
                <form id="adminForm" class="d-none">
                    <div class="mb-3">
                        <label class="form-label">Admin Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                            <input type="text" id="admUser" class="form-control" placeholder="Username" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="admPass" class="form-control" placeholder="Administrator Password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-login">Verify Admin Access</button>
                    <div class="text-center mt-4">
                        <p class="text-muted small px-3">Only authorized district officials should attempt login here.</p>
                    </div>
                </form>

                <div class="text-center mt-4 pt-3 border-top">
                    <a href="index.html" class="text-decoration-none small text-muted"><i class="bi bi-house-door"></i> Back to Portal Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function switchLogin(type) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + type).classList.add('active');
            
            if (type === 'citizen') {
                document.getElementById('citizenForm').classList.remove('d-none');
                document.getElementById('adminForm').classList.add('d-none');
            } else {
                document.getElementById('citizenForm').classList.add('d-none');
                document.getElementById('adminForm').classList.remove('d-none');
            }
        }

        // Citizen Login Logic
        document.getElementById('citizenForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('citPhone').value;
            const password = document.getElementById('citPass').value;
            const alertBox = document.getElementById('loginAlert');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('kdp_user', JSON.stringify(data.user));
                    alertBox.innerHTML = '<div class="alert alert-success">Login successful! Redirecting...</div>';
                    setTimeout(() => window.location.href = 'complaint.html', 1500);
                } else {
                    alertBox.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
                }
            } catch (err) {
                alertBox.innerHTML = '<div class="alert alert-danger">Server connection error.</div>';
            }
        });

        // Admin Login Logic
        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('admUser').value;
            const password = document.getElementById('admPass').value;
            const alertBox = document.getElementById('loginAlert');

            try {
                const res = await fetch('/api/auth/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    sessionStorage.setItem('kdp_admin', data.token);
                    alertBox.innerHTML = '<div class="alert alert-primary">Admin authenticated. Opening Dashboard...</div>';
                    setTimeout(() => window.location.href = 'admin.html', 1500);
                } else {
                    alertBox.innerHTML = `<div class="alert alert-danger">Access Denied: ${data.message}</div>`;
                }
            } catch (err) {
                alertBox.innerHTML = '<div class="alert alert-danger">Server connection error.</div>';
            }
        });
    </script>
</body>
</html>
